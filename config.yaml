# =============================================================================
# Polymarket Agent Configuration
# =============================================================================
#
# This file controls how the agent fetches, filters, enriches, and assesses
# prediction markets from Polymarket. Adjust these settings to focus the
# analysis on markets most likely to contain mispricings you can exploit.


# =============================================================================
# LLM Settings
# =============================================================================

llm:
  # Which model runs market assessments. This is the main cost driver.
  #
  # Anthropic:  claude-sonnet-4-5 (recommended), claude-haiku-4-5 (cheapest), claude-opus-4-5 (best)
  # OpenAI:     gpt-5.2 (flagship), gpt-5-mini (fast)
  # Google:     gemini-3-pro-preview (best), gemini-3-flash-preview (cheapest)
  model: claude-haiku-4-5

# Run multiple models on each market and aggregate their estimates.
# Higher agreement between models increases confidence in the assessment.
# Leave empty or comment out to use a single model (faster, cheaper).
consensus_models: []

# How many markets to assess (most expensive step).
# The agent enriches a few extra candidates, then picks the best-evidenced
# ones for LLM assessment. Increase for broader coverage, decrease to save cost.
llm_analysis_limit: 10
enrichment_limit: 30


# =============================================================================
# Risk Tolerance
# =============================================================================

# Controls how large a mispricing must be to rank highly.
#   conservative  – only flag >20% deviations (fewer, higher-conviction picks)
#   moderate      – flag >10% deviations (balanced)
#   aggressive    – flag >5% deviations (more picks, more noise)
risk_tolerance: moderate


# =============================================================================
# Market Filters
# =============================================================================
#
# These narrow the many active markets down to a manageable set of candidates
# before the expensive enrichment and LLM steps.

filters:

  # --- Topic filters ---

  # Only include markets whose title contains at least one of these keywords.
  # Leave empty to include all topics.
  # Examples:
  #   keywords: ["Trump", "Bitcoin", "Election"]
  #   keywords: ["Climate", "Gender", "Woke"]
  keywords: ["Trump", "election", "Biden", "Congress", "Senate", "democrat", "republican"]

  # Exclude markets whose title contains any of these keywords.
  # Pre-populated to remove sports/entertainment markets, which are hard to
  # assess with web search and LLM reasoning.
  exclude_keywords:
    - NFL
    - NBA
    - MLB
    - NHL
    - FIFA
    - Super Bowl
    - World Series
    - Stanley Cup
    - Premier League
    - Champions League
    - La Liga
    - Serie A
    - Bundesliga
    - UFC
    - MMA
    - boxing
    - tennis
    - golf
    - PGA
    - Formula 1
    - F1
    - NASCAR
    - cricket
    - rugby
    - Olympics
    - World Cup
    - basketball
    - football score
    - touchdown
    - home run
    - goalkeeper

  # Filter by Polymarket tag IDs (more precise than keyword matching).
  # Find IDs with: python scripts/list_tags.py --search "keyword"
  #   2: Politics  |  21: Crypto  |  96: Ukraine
  #   101191: Trump Presidency  |  101970: World  |  100265: Geopolitics
  # Note: the API only supports filtering by one tag at a time.
  tag_ids: []

  # Categories to include. Rarely useful because Polymarket's API returns
  # empty categories for most events. Prefer keywords or tag_ids instead.
  categories: []

  # --- Volume & liquidity ---

  # Minimum trading volume in USD. Filters out illiquid, low-interest markets.
  min_volume: 500
  # Maximum trading volume. Set lower (e.g. 50000) to focus on under-the-radar
  # markets where mispricings are more likely to persist.
  max_volume: 80000

  min_liquidity: 50
  max_liquidity: null  # null = no upper limit

  # --- Time horizon ---

  # Only include markets that resolve within this many days.
  # Set to 0 for no limit.
  max_days_to_expiry: 180

  # --- Geographic focus ---

  # Restrict to markets about specific regions. Uses weighted keyword matching
  # against market titles. Leave empty for all regions.
  # Available: US, EU, UK, ASIA, LATAM, MIDDLE_EAST, AFRICA, CRYPTO, GLOBAL
  geographic_regions: []

  # How strong the geographic signal must be (0-100).
  #   30 (default) – any moderate keyword match
  #   50 – strong indicator or multiple matches
  #   70 – definitive indicator (e.g. "United States Congress")
  geo_min_score: 30

  # --- Reasoning complexity ---

  # When true, only keep markets where LLM reasoning is likely to add value
  # (conditional questions, multi-step analysis, long time horizons).
  reasoning_heavy_only: false
  min_reasoning_score: 0

  # Which levels of estimated LLM edge to keep.
  llm_edge_levels:
    - high
    - medium

  # --- Multi-market events ---

  # Exclude events with more than N sub-markets. Events like "Who will be
  # PM of Japan?" spawn dozens of per-candidate markets that are expensive
  # to assess and hard to evaluate independently.
  # Set to 1 to only keep single-market events.
  max_markets_per_event: 1

  # --- Demographic bias detection ---

  # Minimum "blind spot" score (0-100) for a market to pass the bias filter.
  # Lower values are more inclusive. Only used when bias analysis is enabled.
  min_blind_spot_score: 20

  # Which levels of estimated mispricing likelihood to keep.
  mispricing_levels:
    - high
    - medium


# =============================================================================
# Bias Analysis
# =============================================================================
#
# Polymarket's user base skews male (~73%), young (25-45), US-centric (~31%),
# politically right-leaning, and crypto-enthusiastic. These demographics create
# systematic blind spots that may cause mispricings.
#
# When enabled, the agent:
#   1. Scores each market for demographic bias potential (keyword-based)
#   2. Optionally refines that score with an LLM call
#   3. Tells the assessment LLM about detected biases so it can correct for them
#
# Potential blind spots (more likely to be mispriced):
#   - Non-US politics (LATAM, Africa, Middle East, Asia)
#   - Women-centric topics
#   - Left-leaning political outcomes
#   - Crypto-skeptical outcomes

# Use a (cheap) LLM to refine keyword-based bias detection. Fixes false positives
# like "Will Bitcoin crash?" being tagged as crypto-optimistic.
# This also enables the keyword bias filter automatically.
llm_bias_analysis: true

# Which model to use for bias refinement (keep this cheap).
llm_bias_model: claude-haiku-4-5


# =============================================================================
# Spread Analysis
# =============================================================================
#
# Fetches live orderbook data to calculate actual trading costs (bid-ask spread,
# slippage). Subtracts these from the estimated mispricing to compute "net edge".
# Markets where spread exceeds mispricing are penalised in the ranking.

enable_spread_analysis: false


# =============================================================================
# Data & Storage
# =============================================================================

# How many markets to pull from the Polymarket API (before filtering).
max_markets_to_fetch: 100000

# Persist predictions in SQLite for backtesting and tracking accuracy over time.
# Run `python scripts/backtest.py` to compare past predictions with outcomes.
enable_database: true
db_path: data/polymarket_analysis.db


# =============================================================================
# Output
# =============================================================================

output_dir: output

# Report format: "markdown", "json", "csv", or "both" (json + csv)
output_format: markdown


# =============================================================================
# Debugging
# =============================================================================

# Print detailed logs (API calls, filter steps, scoring breakdowns).
verbose: false

# Fetch and filter markets but skip all LLM calls. Useful for testing filters.
dry_run: false
