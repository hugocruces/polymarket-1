# =============================================================================
# Polymarket Bias Scanner — Configuration
# =============================================================================
#
# Loaded automatically from ./config.yaml by `python -m polymarket_agent.scan`.
# Override with --config PATH. CLI flags always win over YAML.
#
# Precedence (highest wins):
#   1. CLI flags (e.g. --min-volume 50000)
#   2. This YAML file
#   3. Built-in defaults in polymarket_agent/scanner_config.py
#
# Keys here must match ScannerConfig field names exactly. Unknown keys are
# logged and ignored, so stale entries won't silently take effect.


# -----------------------------------------------------------------------------
# LLM
# -----------------------------------------------------------------------------

# Model alias for classification. See polymarket_agent/config.py:LLM_MODELS
# for the current mapping of aliases to provider model IDs.
llm_model: claude-sonnet-4-6


# -----------------------------------------------------------------------------
# Market filters
# -----------------------------------------------------------------------------

# Minimum trading volume in USD. Filters out illiquid, low-interest markets.
min_volume: 5000

# Minimum liquidity in USD.
min_liquidity: 2000

# Only include markets that resolve within this many days.
max_days_to_expiry: 90


# -----------------------------------------------------------------------------
# Scanner behavior
# -----------------------------------------------------------------------------

# How many markets to pull from the Polymarket API before filtering.
max_markets: 500

# Cap on LLM-classified markets included in the final report.
# Always-monitored markets (see always_include_keywords) are exempt from
# this cap.
max_reported_markets: 20


# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------

# Directory for auto-named reports. Overridden by --output PATH.
output_dir: output

# Enable debug-level logging.
verbose: false


# -----------------------------------------------------------------------------
# Always-monitored keywords
# -----------------------------------------------------------------------------
#
# Markets whose question, description, event title, or tags match ANY of
# these keywords are always included in the report, bypassing volume /
# liquidity filters and the LLM classification step. Match is case-insensitive.

always_include_keywords:
  # PSOE — historic & current leadership
  - "Pedro Sanchez"
  - "Zapatero"
  - "Felipe Gonzalez"
  - "Alfredo Perez Rubalcaba"
  - "Joaquin Almunia"
  - "Patxi Lopez"
  - "Carmen Calvo"
  - "Maria Jesus Montero"
  - "Teresa Ribera"
  - "Adriana Lastra"
  - "Abalos"
  - "Koldo"
  # Podemos / Sumar / IU
  - "Pablo Iglesias"
  - "Yolanda Diaz"
  - "Irene Montero"
  - "Ione Belarra"
  - "Alberto Garzon"
  # Regional / municipal left
  - "Ada Colau"
  - "Monica Oltra"
  # UFO / UAP / extraterrestrial
  - "UAP"
  - "UFO"
  - "extraterrestrial life"
  - "alien life"
  - "alien civilization"
  - "alien contact"
  - "alien disclosure"
  - "Area 51"
  - "Roswell"
  - "first contact"
  # Religious prophecy & end-times
  - "Second Coming"
  - "return of Jesus"
  - "return of Christ"
  - "Rapture"
  - "End Times"
  - "Antichrist"
  - "Armageddon"
  - "biblical prophecy"
  - "apocalypse"
