# Polymarket Agent Configuration

# Market filtering configuration
filters:
  # Categories to include (empty = all categories)
  # Note: Polymarket API doesn't provide explicit categories,
  # so this uses keyword matching on market titles
  # Many Polymarket events return empty category and tag fields from the API
  # Use keywords instead, which matches against the actual market titles (questions)
  categories: []

  # Keywords to search for in market titles/descriptions
  # Use this to filter by topic (e.g., Trump, Bitcoin, election)
  # Empty = no keyword inclusion filter (rely on categories/tags + exclusions)
  # keywords: ["Trump", "Bitcoin", "Crypto", "Election", "Woke", "Climate", "Gender", "Ukraine", "Israel", "Spain", "Spanish"]
  # keywords: ["Bitcoin", "Crypto", "Altcoin", "Ethereum", "Solana", "Cardano", "Ripple", "Dogecoin"]
  # keywords: ["Woke", "Climate", "Gender"]
  keywords: []

  # Keywords to exclude - remove sports and entertainment markets
  exclude_keywords:
    - NFL
    - NBA
    - MLB
    - NHL
    - FIFA
    - Super Bowl
    - World Series
    - Stanley Cup
    - Premier League
    - Champions League
    - La Liga
    - Serie A
    - Bundesliga
    - UFC
    - MMA
    - boxing
    - tennis
    - golf
    - PGA
    - Formula 1
    - F1
    - NASCAR
    - cricket
    - rugby
    - Olympics
    - World Cup
    - basketball
    - football score
    - touchdown
    - home run
    - goalkeeper
  
  # Volume range in USD
  # - min_volume: Markets must have at least this much volume
  # - max_volume: Markets must have at most this much volume (null = no limit)
  # Tip: Use max_volume to find potentially mispriced low-volume markets
  min_volume: 1000
  max_volume: 100000  # e.g., 50000 to find markets with $1K-$50K volume

  # Liquidity range in USD
  min_liquidity: 50
  max_liquidity: null
  
  # Maximum days until market resolution
  max_days_to_expiry: 120 # 0 means no limit
  
  # Geographic regions to focus on (uses weighted keyword matching)
  # Available regions:
  #   - US: United States
  #   - EU: European Union
  #   - UK: United Kingdom
  #   - ASIA: Asia-Pacific (China, Japan, Korea, India, SE Asia)
  #   - LATAM: Latin America
  #   - MIDDLE_EAST: Middle East
  #   - AFRICA: Africa
  #   - CRYPTO: Cryptocurrency/blockchain
  #   - GLOBAL: Global/international topics
  # geographic_regions: ["EU", "AFRICA"]
  geographic_regions: ["EU", "ASIA", "LATAM", "MIDDLE_EAST", "AFRICA"]

  # Minimum confidence score (0-100) for geographic matching
  # - 30 (default): Include if any moderate keyword matches
  # - 50: Require strong indicator or multiple keyword matches
  # - 70: Require definitive indicator (e.g., "United States Congress")
  geo_min_score: 30

  # Reasoning analysis filter - find markets where LLM may have edge
  # Reasoning-heavy: conditional questions, complex analysis, long horizons
  reasoning_heavy_only: false  # Set true to filter for reasoning-heavy markets
  min_reasoning_score: 0  # Minimum reasoning score (0-100)
  llm_edge_levels:  # Filter by LLM edge likelihood
    - high
    - medium

  # Filter by Polymarket tag IDs (more precise than keyword matching)
  # Get tag IDs from: https://gamma-api.polymarket.com/tags
  # Or use: python scripts/list_tags.py --search "keyword"
  #
  # Common active tags:
  #   - 2: "Politics" (most active)
  #   - 101191: "Trump Presidency"
  #   - 96: "Ukraine"
  #   - 21: "Crypto"
  #   - 101970: "World"
  #   - 100265: "Geopolitics"
  #
  # Note: Can only filter by ONE tag_id at a time via the API
  tag_ids: []

  # Demographic bias filter - find markets where user biases may cause mispricing
  # Based on Polymarket user demographics research:
  #   - Gender: ~73% male, ~27% female
  #   - Age: Concentrated 25-45 (largest group: 25-34)
  #   - Geography: US (~31%), Germany (~7%), Canada (~5%), Vietnam (~4%), UK (~3%)
  #   - Political: Right-leaning bias on political markets (crypto user overlap)
  #   - Crypto: High enthusiasm (may overestimate crypto-positive outcomes)
  #
  # Potential blind spots (more likely to be mispriced):
  #   - Non-US politics and regions (LATAM, AFRICA, MIDDLE_EAST, ASIA)
  #   - Women-centric topics (male-dominated user base)
  #   - Left-leaning political outcomes (may be underpriced)
  #   - Crypto-skeptical outcomes (may be underpriced)
  #
  bias_filter_enabled: true  # Set true to filter for demographic bias potential
  min_blind_spot_score: 20  # Minimum blind spot score (0-100), lower = more inclusive
  mispricing_levels:  # Filter by mispricing likelihood
    - high
    - medium

# Risk tolerance: conservative, moderate, aggressive
# - conservative: Only high-confidence mispricings (>20% deviation)
# - moderate: Balanced approach (>10% deviation)
# - aggressive: Include speculative opportunities (>5% deviation)
risk_tolerance: moderate

# LLM configuration
llm:
  # Model to use for market assessment
  # Anthropic:
  #   - claude-sonnet-4-5 (recommended, best balance of speed/quality)
  #   - claude-haiku-4-5 (fastest)
  #   - claude-opus-4-5 (highest quality)
  # OpenAI:
  #   - gpt-5.2 (flagship)
  #   - gpt-5-mini (fast/efficient)
  # Google:
  #   - gemini-3-flash-preview, 
  #   - gemini-3-pro-preview
  model: gemini-3-pro-preview

# Processing limits
max_markets_to_fetch: 100000
enrichment_limit: 20
llm_analysis_limit: 15

# Output configuration
output_dir: output
output_format: markdown

# Debugging
verbose: false
dry_run: false
