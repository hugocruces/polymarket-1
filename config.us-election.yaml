# Example: Filter US Presidential Election Markets
# This configuration focuses on US presidential election markets using tag filtering

filters:
  # Empty categories - using tag_ids instead for precise filtering
  categories: []
  
  # Keywords to further narrow down results
  keywords:
    - Trump
    - Biden
    - president
    - election
  
  exclude_keywords: []
  
  # Minimum trading volume in USD
  min_volume: 50000
  
  # Minimum market liquidity in USD  
  min_liquidity: 10000
  
  # Maximum days until market resolution
  max_days_to_expiry: 365
  
  # Geographic filtering (keyword matching - less precise)
  geographic_regions: []
  
  # Filter by Polymarket tag ID (more precise - recommended)
  # Tag 101191 = "Trump Presidency" (active events)
  # Tag 126 = "Trump" (active events)  
  # To find more tags: python scripts/list_tags.py --search "keyword"
  tag_ids:
    - 101191  # Trump Presidency

# Risk tolerance settings
risk_tolerance: moderate

# LLM configuration
llm:
  model: claude-sonnet-4-5-20250514

# Processing limits
max_markets_to_fetch: 500
enrichment_limit: 15
llm_analysis_limit: 10

# Output configuration
output_dir: output
output_format: both

# Debugging
verbose: false
dry_run: false
